services:
  web:
    image: node:24-alpine
    container_name: pulse-web-ci-container
    working_dir: /usr/src/app/apps/web
    command: sh -c "npm ci && npm run typecheck && npm run build"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
    volumes:
      - ./:/usr/src/app
      - pulse-web-ci-node-modules:/usr/src/app/apps/web/node_modules
      - pulse-web-ci-next:/usr/src/app/apps/web/.next
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    container_name: backend-ci-container
    build:
      context: ./backend
      target: dev
    command: sh -c "npm run db:setup && npm test"
    environment:
      NODE_ENV: test
      FRONTEND: http://localhost:4300
      FRONTEND_PORT: 4300
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres-ci-container
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuotesuite -d kuotesuite"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pulse-web-ci-node-modules:
  pulse-web-ci-next:
