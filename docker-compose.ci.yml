services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres-ci-container
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuotesuite -d kuotesuite"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    container_name: pulse-api-ci-container
    image: node:24-alpine
    working_dir: /usr/src/app/apps/api
    command: sh -c "npm ci && npm run db:initialize && npm test && npm run build"
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_SESSION_SECRET: pulse-local-test-session-secret
      FRONTEND_ORIGIN: http://localhost:4300
    volumes:
      - ./:/usr/src/app
      - pulse-api-ci-node-modules:/usr/src/app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:24-alpine
    container_name: pulse-web-ci-container
    working_dir: /usr/src/app/apps/web
    command: sh -c "npm ci && npm run typecheck && npm run build"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_API_URL: http://api:3000
      PULSE_SESSION_SECRET: pulse-local-test-session-secret
    volumes:
      - ./:/usr/src/app
      - pulse-web-ci-node-modules:/usr/src/app/apps/web/node_modules
      - pulse-web-ci-next:/usr/src/app/apps/web/.next
    depends_on:
      api:
        condition: service_completed_successfully

volumes:
  pulse-api-ci-node-modules:
  pulse-web-ci-node-modules:
  pulse-web-ci-next:
