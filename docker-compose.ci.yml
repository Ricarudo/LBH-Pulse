services:
  
  gui:
    container_name: gui-container
    restart: always
    build: ./gui
    ports:
      - '4200:4200'

    environment:
      NODE_ENV: prod
      DEBUG: 'false'
    volumes:
      - /usr/src/app/gui
      - /usr/src/app/gui/node_modules
    links:
      - backend
    command: npm start

  backend:
    container_name: backend-container
    restart: always
    command: sh -c "npm run db:setup && npm start"
    build: ./backend
    ports:
      - 3000:3000
    volumes:
      - /usr/src/app/backend
      - /usr/src/app/backend/node_modules
    
    # env_file: .env
    environment:
      NODE_ENV: prod
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres-container
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuotesuite -d kuotesuite"]
      interval: 5s
      timeout: 5s
      retries: 12
