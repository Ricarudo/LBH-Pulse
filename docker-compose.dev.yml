version: '3.8'

services:

  gui:
    container_name: gui-container
    restart: always
    build: ./gui
    ports:
      - '4200:4200'

    environment:
      NODE_ENV: dev
      DEBUG: 'true'
    volumes:
      - /usr/src/app/gui
      - /usr/src/app/gui/node_modules
    links:
      - backend
    command: npm run start

  backend:
    container_name: backend-container
    restart: always
    command: sh -c "npm test && npm start"
    build: ./backend
    ports:
      - 3000:3000
    volumes:
      - /usr/src/app/backend
      - /usr/src/app/backend/node_modules

    environment:
      NODE_ENV: dev
      DATABASE_HOST: database
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=public
    depends_on:
      - database
    # command: npm run debug

  database: 
    build: ./database
    container_name: database-container
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports: 
      - 3306:3306
      # - 3318:3306

  postgres:
    image: postgres:16-alpine
    container_name: postgres-container
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
