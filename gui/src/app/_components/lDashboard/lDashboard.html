

<table mat-table [dataSource]="leads" class="mat-elevation-z8 lead-table">
    <!-- Claim Column -->
    <ng-container matColumnDef="Lead id">
      <th mat-header-cell *matHeaderCellDef> Lead ID</th>
      <td mat-cell *matCellDef="let lead"> {{lead.lead_id}} </td>
    </ng-container>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let lead"> {{lead.title}} </td>
    </ng-container>

    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let lead"> {{lead.state_name}} </td>
    </ng-container>
  
    <!-- Value Column -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description </th>
      <td mat-cell *matCellDef="let lead"> {{lead.projectDescription}} </td>
    </ng-container>

    <!-- Value Column -->
    <ng-container matColumnDef="client">
      <th mat-header-cell *matHeaderCellDef> Client </th>
      <td mat-cell *matCellDef="let lead"> {{lead.client_name}} </td>
    </ng-container>

    <!-- Value Column -->
    <ng-container matColumnDef="clientsite">
      <th mat-header-cell *matHeaderCellDef> Client Site </th>
      <td mat-cell *matCellDef="let lead"> {{lead.client_site_name}} </td>
    </ng-container>

    <!-- Value Column -->
    <ng-container matColumnDef="poc">
      <th mat-header-cell *matHeaderCellDef> Point of Contact </th>
      <td mat-cell *matCellDef="let lead"> {{lead.point_of_contact_name}} </td>
    </ng-container>

    <!-- Value Column -->
    <ng-container matColumnDef="dateReceived">
      <th mat-header-cell *matHeaderCellDef> Date Received </th>
      <td mat-cell *matCellDef="let lead"> {{lead.dateReceived}} </td>
    </ng-container>

    <!-- Value Column -->
    <ng-container matColumnDef="dateDue">
      <th mat-header-cell *matHeaderCellDef> Date Due </th>
      <td mat-cell *matCellDef="let lead"> {{lead.dueDate}} </td>
    </ng-container>

  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row (click)="getLeadPage(lead.lead_id)" *matRowDef="let row; let lead; columns: displayedColumns;"></tr>
</table>
