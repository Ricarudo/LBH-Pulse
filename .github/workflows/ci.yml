name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run isolated Pulse checks
        run: >-
          docker compose -f compose.ci.yaml up
          --build
          --abort-on-container-exit
          --exit-code-from checks

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f compose.ci.yaml logs --no-color

      - name: Remove CI resources
        if: always()
        run: docker compose -f compose.ci.yaml down -v --remove-orphans
