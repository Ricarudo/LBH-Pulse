services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuotesuite -d kuotesuite"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: pulse-minio-container
    command: server /data --console-address ":9001"
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: pulse_minio
      MINIO_ROOT_PASSWORD: pulse_minio_local_password
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: pulse-minio-init-container
    entrypoint: >
      /bin/sh -c "
      mc alias set pulse http://minio:9000 pulse_minio pulse_minio_local_password &&
      mc mb --ignore-existing pulse/pulse-documents &&
      mc anonymous set none pulse/pulse-documents
      "
    depends_on:
      minio:
        condition: service_healthy

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    container_name: pulse-clamav-container
    restart: always
    volumes:
      - clamav-data:/var/lib/clamav
      - ./docker/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  api:
    container_name: pulse-api-container
    build:
      context: ./apps/api
      target: dev
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_SESSION_SECRET: pulse-local-dev-session-secret
      FRONTEND_ORIGIN: http://localhost:4300
      PULSE_LEGACY_LEAD_BACKUP_ROOT: /usr/src/pulse-backups/legacy-leads
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: pulse-documents
      S3_ACCESS_KEY: pulse_minio
      S3_SECRET_KEY: pulse_minio_local_password
      S3_FORCE_PATH_STYLE: "true"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      CLAMAV_TIMEOUT_MS: "180000"
      DOCUMENT_TEMP_DIR: /tmp/pulse-uploads
    volumes:
      - ./apps/api:/usr/src/app
      - ./database/local-backups:/usr/src/pulse-backups
      - pulse-api-node-modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy

  web:
    image: node:24-alpine
    container_name: pulse-web-container
    working_dir: /usr/src/app/apps/web
    command: sh -c "npm ci && npm run dev"
    ports:
      - "4300:4300"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_API_URL: http://api:3000
      PULSE_SESSION_SECRET: pulse-local-dev-session-secret
      PULSE_ALLOWED_DEV_ORIGINS: ${PULSE_ALLOWED_DEV_ORIGINS:-192.168.1.*}
    volumes:
      - ./:/usr/src/app
      - pulse-web-node-modules:/usr/src/app/apps/web/node_modules
      - pulse-web-next:/usr/src/app/apps/web/.next
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  minio-data:
  clamav-data:
  pulse-api-node-modules:
  pulse-web-node-modules:
  pulse-web-next:
