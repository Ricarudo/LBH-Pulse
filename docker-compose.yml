services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kuotesuite
      POSTGRES_PASSWORD: kuotesuite_dev_password
      POSTGRES_DB: kuotesuite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuotesuite -d kuotesuite"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    container_name: pulse-api-container
    build:
      context: ./apps/api
      target: dev
    command: sh -c "npm run prisma:generate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_SESSION_SECRET: pulse-local-dev-session-secret
      FRONTEND_ORIGIN: http://localhost:4300
      PULSE_LEGACY_LEAD_BACKUP_ROOT: /usr/src/pulse-backups/legacy-leads
    volumes:
      - ./apps/api:/usr/src/app
      - ./database/local-backups:/usr/src/pulse-backups
      - pulse-api-node-modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:24-alpine
    container_name: pulse-web-container
    working_dir: /usr/src/app/apps/web
    command: sh -c "npm ci && npm run dev"
    ports:
      - "4300:4300"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kuotesuite:kuotesuite_dev_password@postgres:5432/kuotesuite?schema=pulse
      PULSE_API_URL: http://api:3000
      PULSE_SESSION_SECRET: pulse-local-dev-session-secret
    volumes:
      - ./:/usr/src/app
      - pulse-web-node-modules:/usr/src/app/apps/web/node_modules
      - pulse-web-next:/usr/src/app/apps/web/.next
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  pulse-api-node-modules:
  pulse-web-node-modules:
  pulse-web-next:
